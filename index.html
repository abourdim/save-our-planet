<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save Our Planet 🌍</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&family=Noto+Kufi+Arabic:wght@300;400;600;700&display=swap');
:root{--bg-primary:#0a0e1a;--bg-secondary:#111827;--bg-card:#1a2236;--text-primary:#e2e8f0;--text-secondary:#94a3b8;--accent-glow:#00f0ff;--accent-green:#00ff88;--border-color:rgba(0,240,255,0.15);--font-display:'Orbitron',sans-serif;--font-body:'Exo 2',sans-serif;--zone-color:var(--accent-glow)}
[dir="rtl"]{--font-body:'Noto Kufi Arabic','Exo 2',sans-serif;--font-display:'Noto Kufi Arabic','Orbitron',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(0,240,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;width:3px;height:3px;background:var(--accent-glow);border-radius:50%;opacity:0;animation:fp 8s infinite}
@keyframes fp{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.6}90%{opacity:.2}100%{opacity:0;transform:translateY(-10vh) scale(1)}}
.screen{display:none;position:relative;z-index:1;min-height:100vh;animation:fi .5s ease}
.screen.active{display:flex;flex-direction:column}
@keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lang-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:center;gap:4px;padding:10px;background:rgba(10,14,26,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border-color)}
.lang-btn{font-family:var(--font-body);font-size:.75rem;font-weight:600;padding:6px 16px;border:1px solid var(--border-color);border-radius:4px;background:0 0;color:var(--text-secondary);cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:1px}
.lang-btn.active,.lang-btn:hover{background:var(--accent-glow);color:var(--bg-primary);border-color:var(--accent-glow);box-shadow:0 0 15px rgba(0,240,255,.3)}
#welcome{align-items:center;justify-content:center;min-height:100vh;padding:80px 20px 40px;text-align:center}
.wm-svg{width:180px;height:180px;margin-bottom:20px;filter:drop-shadow(0 0 30px rgba(0,240,255,.5));animation:mf 3s ease-in-out infinite}
@keyframes mf{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.wt{font-family:var(--font-display);font-size:clamp(2rem,6vw,3.5rem);font-weight:900;background:linear-gradient(135deg,var(--accent-glow),var(--accent-green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;letter-spacing:2px}
.ws{font-size:clamp(.9rem,2.5vw,1.1rem);color:var(--text-secondary);margin-bottom:40px;font-weight:300}
.nig{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:30px}
.nl{font-family:var(--font-display);font-size:.8rem;color:var(--accent-glow);letter-spacing:3px;text-transform:uppercase}
.ni{font-family:var(--font-body);font-size:1.2rem;padding:14px 24px;border:2px solid var(--border-color);border-radius:8px;background:var(--bg-card);color:var(--text-primary);text-align:center;width:min(320px,90vw);outline:0;transition:all .3s}
.ni:focus{border-color:var(--accent-glow);box-shadow:0 0 20px rgba(0,240,255,.2)}
.sb{font-family:var(--font-display);font-size:1rem;font-weight:700;padding:16px 48px;border:2px solid var(--accent-glow);border-radius:8px;background:linear-gradient(135deg,rgba(0,240,255,.15),rgba(0,255,136,.1));color:var(--accent-glow);cursor:pointer;text-transform:uppercase;letter-spacing:3px;transition:all .3s}
.sb:hover{background:var(--accent-glow);color:var(--bg-primary);box-shadow:0 0 40px rgba(0,240,255,.4);transform:scale(1.05)}
#hub{padding:70px 20px 40px;align-items:center}
.hh{text-align:center;margin-bottom:30px;padding-top:20px}
.hg{font-size:.9rem;color:var(--text-secondary);margin-bottom:6px}
.ht{font-family:var(--font-display);font-size:clamp(1.3rem,4vw,2rem);color:var(--accent-glow);letter-spacing:2px}
.hp{font-size:.8rem;color:var(--text-secondary);margin-top:8px}
.pb{width:200px;height:4px;background:var(--bg-card);border-radius:2px;margin:8px auto 0;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent-glow),var(--accent-green));border-radius:2px;transition:width .5s;width:0}
.hg2{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:16px;max-width:920px;width:100%;padding:10px}
.hc{position:relative;background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:20px 14px 18px;text-align:center;cursor:pointer;transition:all .3s;overflow:hidden}
.hc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--zone-color);opacity:.6;transition:opacity .3s}
.hc:hover{transform:translateY(-4px);border-color:var(--zone-color);box-shadow:0 8px 30px rgba(0,0,0,.4),0 0 20px color-mix(in srgb,var(--zone-color) 20%,transparent)}
.hc:hover::before{opacity:1}
.hcs{width:72px;height:72px;margin:0 auto 10px;filter:drop-shadow(0 0 12px color-mix(in srgb,var(--zone-color) 40%,transparent))}
.hct{font-family:var(--font-display);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.hcc{font-size:.65rem;color:var(--text-secondary)}
.hst{display:inline-block;margin-top:8px;font-size:.6rem;padding:2px 10px;border-radius:3px;background:rgba(0,240,255,.1);color:var(--accent-glow);text-transform:uppercase;letter-spacing:1px}
.hc.explored .hst{background:rgba(0,255,136,.15);color:var(--accent-green)}
.bn{display:flex;gap:10px;margin-top:30px;flex-wrap:wrap;justify-content:center}
.nb{font-family:var(--font-display);font-size:.65rem;font-weight:700;padding:10px 20px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-secondary);cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all .3s}
.nb:hover{border-color:var(--accent-glow);color:var(--accent-glow);box-shadow:0 0 15px rgba(0,240,255,.15)}
#zone-detail{padding:60px 20px 40px;align-items:center}
.zh{text-align:center;padding:30px 20px 20px;width:100%;max-width:900px}
.zb{font-family:var(--font-body);font-size:.8rem;color:var(--text-secondary);background:0 0;border:0;cursor:pointer;margin-bottom:16px;transition:color .3s;display:inline-flex;align-items:center;gap:6px}
.zb:hover{color:var(--accent-glow)}
.zsl{width:120px;height:120px;margin:0 auto 14px;filter:drop-shadow(0 0 30px color-mix(in srgb,var(--zone-color) 50%,transparent))}
.zt{font-family:var(--font-display);font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;letter-spacing:2px;margin-bottom:8px}
.zd{font-size:.9rem;color:var(--text-secondary);max-width:600px;margin:0 auto;line-height:1.6}
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px;max-width:900px;width:100%;padding:20px 0}
.rc{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:24px;transition:all .3s;position:relative;overflow:hidden}
.rc::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,color-mix(in srgb,var(--zone-color) 5%,transparent),transparent);pointer-events:none}
.rc:hover{border-color:var(--zone-color);transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.rh{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.ras{width:56px;height:56px;flex-shrink:0;background:rgba(0,0,0,.3);border-radius:12px;border:1px solid var(--border-color);padding:4px}
.rn{font-family:var(--font-display);font-size:.8rem;font-weight:700;letter-spacing:1px}
.rr{font-size:.7rem;color:var(--zone-color);margin-top:2px}
.rd{font-size:.85rem;color:var(--text-secondary);line-height:1.6;margin-bottom:14px;position:relative;z-index:1}
.rs{display:flex;gap:12px;position:relative;z-index:1}
.st{flex:1}.sl{font-size:.6rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sbr{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.sfl{height:100%;border-radius:2px;transition:width 1s}
.cs{max-width:900px;width:100%;margin-top:20px}
.cst{font-family:var(--font-display);font-size:.75rem;color:var(--text-secondary);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-inline-start:4px}
.cl{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.ci{font-size:.78rem;color:var(--text-secondary);padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:6px;display:flex;align-items:center;gap:8px;transition:all .2s;border-inline-start:2px solid var(--zone-color)}
.ci:hover{background:rgba(255,255,255,.05);color:var(--text-primary)}
.cn{font-family:var(--font-display);font-size:.6rem;color:var(--zone-color);opacity:.6;min-width:24px}
#laws{padding:70px 20px 40px;align-items:center;justify-content:center;min-height:100vh}
.lc{max-width:700px;width:100%;text-align:center}
.lt{font-family:var(--font-display);font-size:clamp(1.5rem,4vw,2.2rem);color:var(--accent-glow);margin-bottom:8px;letter-spacing:2px}
.lsb{font-size:.9rem;color:var(--text-secondary);margin-bottom:40px}
.lw{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:30px;margin-bottom:16px;text-align:start;position:relative;overflow:hidden;transition:all .3s}
.lw:hover{border-color:var(--accent-glow);box-shadow:0 0 20px rgba(0,240,255,.1)}
.lwn{font-family:var(--font-display);font-size:3rem;font-weight:900;color:var(--accent-glow);opacity:.15;position:absolute;top:10px;inset-inline-end:20px}
.lwh{font-family:var(--font-display);font-size:.85rem;font-weight:700;color:var(--accent-glow);margin-bottom:10px;letter-spacing:1px}
.lwt{font-size:.9rem;color:var(--text-secondary);line-height:1.7}
#build{padding:70px 20px 40px;align-items:center;min-height:100vh}
.bc{max-width:600px;width:100%}
.bt{font-family:var(--font-display);font-size:clamp(1.3rem,4vw,1.8rem);color:var(--accent-green);text-align:center;letter-spacing:2px;margin-bottom:30px;padding-top:20px}
.bf{margin-bottom:20px}
.bl{font-family:var(--font-display);font-size:.7rem;color:var(--text-secondary);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block}
.bi,.bta,.bs{font-family:var(--font-body);font-size:1rem;padding:12px 16px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-card);color:var(--text-primary);width:100%;outline:0;transition:border-color .3s}
.bi:focus,.bta:focus,.bs:focus{border-color:var(--accent-green);box-shadow:0 0 15px rgba(0,255,136,.15)}
.bta{min-height:100px;resize:vertical}.bs{cursor:pointer}.bs option{background:var(--bg-secondary)}
.cp{display:flex;gap:10px;flex-wrap:wrap}
.co{width:36px;height:36px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .2s}
.co:hover,.co.selected{border-color:#fff;transform:scale(1.15);box-shadow:0 0 12px rgba(255,255,255,.2)}
.bbtn{font-family:var(--font-display);font-size:.85rem;font-weight:700;padding:14px 36px;border:2px solid var(--accent-green);border-radius:8px;background:rgba(0,255,136,.1);color:var(--accent-green);cursor:pointer;text-transform:uppercase;letter-spacing:2px;width:100%;margin-top:10px;transition:all .3s}
.bbtn:hover{background:var(--accent-green);color:var(--bg-primary);box-shadow:0 0 30px rgba(0,255,136,.3)}
.ric{display:none;background:var(--bg-card);border:2px solid var(--accent-green);border-radius:16px;padding:30px;margin-top:30px;text-align:center;position:relative;overflow:hidden;animation:fi .5s}
.ric.visible{display:block}
.idb{font-family:var(--font-display);font-size:.6rem;letter-spacing:3px;color:var(--accent-green);text-transform:uppercase;margin-bottom:16px;opacity:.7}
.idas{width:100px;height:100px;margin:0 auto 10px}
.idn{font-family:var(--font-display);font-size:1.4rem;font-weight:900;margin-bottom:6px}
.idz{font-size:.8rem;color:var(--accent-glow);margin-bottom:12px}
.idm{font-size:.9rem;color:var(--text-secondary);line-height:1.6;font-style:italic}
.ida{margin-top:16px;font-size:.75rem;color:var(--text-secondary)}
@media(max-width:600px){.hg2{grid-template-columns:repeat(2,1fr);gap:10px}.hc{padding:16px 8px}.hcs{width:56px;height:56px}.rg{grid-template-columns:1fr}.cl{grid-template-columns:1fr}}
</style>
</head>
<body>

<script>
const D='#1a2236',K='#0d1520';

function init(){const p=document.getElementById('particles');for(let i=0;i<30;i++){const d=document.createElement('div');d.className='particle';d.style.left=Math.random()*100+'%';d.style.animationDelay=Math.random()*8+'s';d.style.animationDuration=(6+Math.random()*6)+'s';p.appendChild(d)}renderHexGrid();renderLaws();renderBuildZoneSelect();renderColorPicker()}

function setLang(l){currentLang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.documentElement.lang=l;document.body.style.fontFamily=l==='ar'?"'Noto Kufi Arabic','Exo 2',sans-serif":"'Exo 2',sans-serif";document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(T[l]?.[k])el.textContent=T[l][k]});document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const k=el.getAttribute('data-i18n-placeholder');if(T[l]?.[k])el.placeholder=T[l][k]});renderHexGrid();renderLaws();renderBuildZoneSelect();updateGreeting()}
function t(k){return T[currentLang]?.[k]||k}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function startMission(){playerName=document.getElementById('playerName').value.trim()||(currentLang==='ar'?'عميل':'Agent');updateGreeting();showScreen('hub')}
function updateGreeting(){const el=document.getElementById('hubGreeting');if(el)el.textContent=t('greeting')+' '+playerName}

function renderHexGrid(){const g=document.getElementById('hexGrid');g.innerHTML='';ZONES.forEach(z=>{const ex=exploredZones.has(z.id);const c=document.createElement('div');c.className='hc'+(ex?' explored':'');c.style.setProperty('--zone-color',z.color);c.onclick=()=>openZone(z.id);c.innerHTML=`<div class="hcs">${R(z.color,ZT[z.id])}</div><div class="hct">${z.name[currentLang]}</div><div class="hcc">${z.robots.length} robots · ${z.chapters[currentLang].length} ${currentLang==='ar'?'فصل':'ch.'}</div><div class="hst">${ex?t('status_explored'):t('status_new')}</div>`;g.appendChild(c)});updateProgress()}
function updateProgress(){document.getElementById('exploredCount').textContent=exploredZones.size;document.getElementById('progressFill').style.width=((exploredZones.size/ZONES.length)*100)+'%'}

function openZone(zid){const z=ZONES.find(x=>x.id===zid);if(!z)return;exploredZones.add(zid);document.documentElement.style.setProperty('--zone-color',z.color);document.getElementById('zoneSvgLarge').innerHTML=R(z.color,ZT[z.id]);document.getElementById('zoneTitle').textContent=z.name[currentLang];document.getElementById('zoneTitle').style.color=z.color;document.getElementById('zoneDesc').textContent=z.desc[currentLang];
const rg=document.getElementById('robotsGrid');rg.innerHTML='';const types=RT[zid]||['city_bot','city_bot','city_bot'];
z.robots.forEach((r,i)=>{const lb=[t('power'),t('speed'),t('intel')];const c=document.createElement('div');c.className='rc';c.style.setProperty('--zone-color',z.color);c.innerHTML=`<div class="rh"><div class="ras">${R(z.color,types[i])}</div><div><div class="rn">${r.name[currentLang]}</div><div class="rr">${r.role[currentLang]}</div></div></div><div class="rd">${r.desc[currentLang]}</div><div class="rs">${r.stats.map((v,j)=>`<div class="st"><div class="sl">${lb[j]}</div><div class="sbr"><div class="sfl" style="width:${v}%;background:${z.color}"></div></div></div>`).join('')}</div>`;rg.appendChild(c)});
const cl=document.getElementById('chapterList');cl.innerHTML='';z.chapters[currentLang].forEach((ch,i)=>{const it=document.createElement('div');it.className='ci';it.style.setProperty('--zone-color',z.color);it.innerHTML=`<span class="cn" style="color:${z.color}">${String(i+1).padStart(2,'0')}</span>${ch}`;cl.appendChild(it)});
showScreen('zone-detail');renderHexGrid()}

function renderLaws(){const c=document.getElementById('lawsCards');c.innerHTML='';[{t:'law1_title',x:'law1_text'},{t:'law2_title',x:'law2_text'},{t:'law3_title',x:'law3_text'}].forEach((l,i)=>{const d=document.createElement('div');d.className='lw';d.innerHTML=`<div class="lwn">${i+1}</div><div class="lwh">${t(l.t)}</div><div class="lwt">${t(l.x)}</div>`;c.appendChild(d)})}

function renderBuildZoneSelect(){const s=document.getElementById('buildZone');s.innerHTML='';ZONES.forEach(z=>{const o=document.createElement('option');o.value=z.id;o.textContent=z.name[currentLang];s.appendChild(o)})}
function renderColorPicker(){const c=document.getElementById('colorPicker');c.innerHTML='';['#00f0ff','#00ff88','#fbbf24','#ff6b2b','#ff3366','#a855f7','#3b82f6','#78716c','#ef4444','#10b981'].forEach(col=>{const d=document.createElement('div');d.className='co'+(col===selectedBuildColor?' selected':'');d.style.background=col;d.onclick=()=>{selectedBuildColor=col;c.querySelectorAll('.co').forEach(el=>el.classList.remove('selected'));d.classList.add('selected')};c.appendChild(d)})}
function buildRobot(){const nm=document.getElementById('buildName').value.trim(),zid=document.getElementById('buildZone').value,ms=document.getElementById('buildMission').value.trim();if(!nm||!ms)return;const z=ZONES.find(x=>x.id===zid),cd=document.getElementById('robotIdCard');cd.classList.add('visible');cd.style.borderColor=selectedBuildColor;document.getElementById('idAvatarSvg').innerHTML=R(selectedBuildColor,ZT[zid]);document.getElementById('idAvatarSvg').style.filter=`drop-shadow(0 0 20px ${selectedBuildColor})`;document.getElementById('idName').textContent=nm;document.getElementById('idName').style.color=selectedBuildColor;document.getElementById('idZone').textContent=z.name[currentLang];document.getElementById('idMission').textContent='« '+ms+' »';document.getElementById('idAuthor').textContent=t('designed_by')+' '+playerName;cd.scrollIntoView({behavior:'smooth',block:'center'})}

document.addEventListener('DOMContentLoaded',init);
document.getElementById('playerName').addEventListener('keydown',e=>{if(e.key==='Enter')startMission()});
</script>
</body>
</html>
